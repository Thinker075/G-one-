<html lang="en">
<head>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    :root {
      /* Default Theme: Dark Purple */
      --bg: #0f0d1c;
      --bg-elev: #15122a;
      --surface: #1c1834;
      --border: #322b58;
      --text: #f3f1ff;
      --text-dim: #a89fd6;
      --text-faint: #6f6796;
      --primary: #8b5cf6;
      --accent: #34e7c4;
      --danger: #ff5c7a;
      --success: #10b981;
      --warning: #f59e0b;
    }

    /* Theme: Light Mode */
    body.theme-light {
      --bg: #f8f7fc;
      --bg-elev: #f0edf7;
      --surface: #e8e5f2;
      --border: #d9d1e8;
      --text: #1a1628;
      --text-dim: #5a5371;
      --text-faint: #8f8ba3;
      --primary: #8b5cf6;
      --accent: #34e7c4;
    }

    /* Theme: Neon Cyberpunk */
    body.theme-neon {
      --bg: #0a0e27;
      --bg-elev: #0f1435;
      --surface: #141a3a;
      --border: #2a3f6f;
      --text: #00ffff;
      --text-dim: #00cc99;
      --text-faint: #0088ff;
      --primary: #ff00ff;
      --accent: #00ffff;
      --danger: #ff0044;
    }

    /* Theme: Minimal Dark */
    body.theme-minimal {
      --bg: #1a1a1a;
      --bg-elev: #2a2a2a;
      --surface: #333333;
      --border: #444444;
      --text: #ffffff;
      --text-dim: #cccccc;
      --text-faint: #999999;
      --primary: #666666;
      --accent: #aaaaaa;
    }

    /* Theme: Ocean Deep */
    body.theme-ocean {
      --bg: #0d1f33;
      --bg-elev: #122a44;
      --surface: #1a3a55;
      --border: #2a4a6f;
      --text: #e8f4f8;
      --text-dim: #8db8d0;
      --text-faint: #5a8aa0;
      --primary: #00a8cc;
      --accent: #6bcf7f;
      --danger: #ff6b6b;
    }

    /* Theme: Forest Green */
    body.theme-forest {
      --bg: #0f2818;
      --bg-elev: #143d24;
      --surface: #1a5230;
      --border: #2a7f3d;
      --text: #e8f5f0;
      --text-dim: #a3d5c4;
      --text-faint: #7ba9a0;
      --primary: #2d9d78;
      --accent: #52b788;
      --danger: #d62828;
    }

    /* Theme: Sunset */
    body.theme-sunset {
      --bg: #2a1810;
      --bg-elev: #3d251a;
      --surface: #4f3d2f;
      --border: #7a5c4a;
      --text: #fef5f0;
      --text-dim: #d4a99d;
      --text-faint: #a8837e;
      --primary: #e76f51;
      --accent: #f4a460;
      --danger: #d62828;
    }

    /* Theme: Cyberpunk Blue */
    body.theme-cyber-blue {
      --bg: #0a1428;
      --bg-elev: #0f1f35;
      --surface: #162a45;
      --border: #1e3a5f;
      --text: #e0f2fe;
      --text-dim: #7dd3fc;
      --text-faint: #38bdf8;
      --primary: #0284c7;
      --accent: #06b6d4;
      --danger: #ef4444;
    }


    /* ──── FLOATING BUBBLE ──── */
    #gone-bubble {
      position: fixed;
      bottom: 90px;
      right: 18px;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #f6d860, #c8960c 55%, #7a5500 85%, #3a2700);
      border: 2px solid #f6d860;
      box-shadow: 0 0 0 0 rgba(139,92,246,0.7);
      cursor: pointer;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      user-select: none;
      touch-action: none;
      transition: transform 0.2s;
    }

    #gone-bubble.idle {
      animation: bubbleIdle 3s ease-in-out infinite;
    }

    @keyframes bubbleIdle {
      0%,100% { box-shadow: 0 0 16px 4px rgba(139,92,246,0.45); transform: scale(1); }
      50%      { box-shadow: 0 0 28px 10px rgba(139,92,246,0.25); transform: scale(1.06); }
    }

    #gone-bubble.listening {
      animation: bubbleListen 0.6s ease-in-out infinite alternate;
    }

    @keyframes bubbleListen {
      from { box-shadow: 0 0 12px 4px rgba(52,231,196,0.5); transform: scale(0.96); }
      to   { box-shadow: 0 0 36px 16px rgba(52,231,196,0.9); transform: scale(1.12); }
    }

    #gone-bubble.thinking {
      animation: bubbleThink 1s ease-in-out infinite;
    }

    @keyframes bubbleThink {
      0%,100% { box-shadow: 0 0 20px 6px rgba(245,158,11,0.5); transform: scale(1); }
      50%      { box-shadow: 0 0 40px 18px rgba(245,158,11,0.8); transform: scale(1.08); }
    }

    #gone-bubble.speaking {
      animation: bubbleSpeak 0.35s ease-in-out infinite alternate;
    }

    @keyframes bubbleSpeak {
      from { box-shadow: 0 0 16px 4px rgba(16,185,129,0.5);  transform: scale(0.97); }
      to   { box-shadow: 0 0 44px 20px rgba(16,185,129,0.95); transform: scale(1.14); }
    }

    #gone-bubble.error {
      animation: bubbleError 0.4s ease-in-out 3;
    }

    @keyframes bubbleError {
      0%,100% { box-shadow: 0 0 16px 4px rgba(255,92,122,0.4); }
      50%      { box-shadow: 0 0 36px 16px rgba(255,92,122,0.9); }
    }

    /* Bubble tooltip / mini panel */
    #bubble-panel {
      position: fixed;
      bottom: 162px;
      right: 14px;
      width: 270px;
      background: #1c1834ee;
      border: 1px solid #322b58;
      border-radius: 16px;
      padding: 14px 16px;
      z-index: 9998;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: none;
      flex-direction: column;
      gap: 10px;
      animation: panelIn 0.25s cubic-bezier(.34,1.56,.64,1);
    }

    #bubble-panel.open { display: flex; }

    @keyframes panelIn {
      from { opacity:0; transform: scale(0.85) translateY(16px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }

    .bp-status {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #a89fd6;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .bp-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.4s ease-in-out infinite;
    }

    .bp-transcript {
      font-size: 13px;
      color: #f3f1ff;
      min-height: 36px;
      line-height: 1.5;
      font-style: italic;
    }

    .bp-answer {
      font-size: 13px;
      color: #34e7c4;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      display: none;
    }

    .bp-answer.visible { display: block; }

    .bp-actions {
      display: flex;
      gap: 8px;
    }

    .bp-btn {
      flex: 1;
      padding: 8px 10px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .bp-btn-mic  { background: #7c3aed; color: white; }
    .bp-btn-stop { background: #ff5c7a; color: white; display:none; }
    .bp-btn-close{ background: #322b58; color: #a89fd6; }

    .bp-btn:hover { opacity: 0.85; transform: scale(1.03); }

    /* Wave bars shown while speaking */
    .bp-wave {
      display: none;
      align-items: center;
      gap: 3px;
      height: 24px;
    }
    .bp-wave.active { display: flex; }
    .bp-wave span {
      display: inline-block;
      width: 4px;
      border-radius: 2px;
      background: var(--accent);
      animation: waveBar 0.8s ease-in-out infinite;
    }
    .bp-wave span:nth-child(1){ height:8px;  animation-delay:0s;    }
    .bp-wave span:nth-child(2){ height:16px; animation-delay:0.1s;  }
    .bp-wave span:nth-child(3){ height:24px; animation-delay:0.2s;  }
    .bp-wave span:nth-child(4){ height:16px; animation-delay:0.3s;  }
    .bp-wave span:nth-child(5){ height:8px;  animation-delay:0.4s;  }
    .bp-wave span:nth-child(6){ height:20px; animation-delay:0.15s; }
    .bp-wave span:nth-child(7){ height:12px; animation-delay:0.25s; }

    @keyframes waveBar {
      0%,100% { transform: scaleY(0.4); opacity:0.5; }
      50%      { transform: scaleY(1);   opacity:1; }
    }

    /* AI Notification toast */
    #gone-toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(-120px);
      background: #1c1834;
      border: 1px solid #8b5cf6;
      border-radius: 14px;
      padding: 12px 18px;
      min-width: 260px;
      max-width: 90vw;
      z-index: 10000;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      box-shadow: 0 4px 24px rgba(139,92,246,0.4);
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
    }

    #gone-toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .toast-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c084fc, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .toast-body { flex: 1; }
    .toast-title { font-size: 12px; font-weight: 700; color: #8b5cf6; margin-bottom: 3px; }
    .toast-msg   { font-size: 13px; color: #f3f1ff; line-height: 1.4; }
    .toast-close {
      background: none; border: none;
      color: #6f6796; cursor: pointer;
      font-size: 18px; padding: 0; line-height: 1;
    }


    /* ──── REALISTIC OVERHAUL ──── */
    body {
      background-attachment: fixed;
      background-size: cover;
      background-position: center;
    }

    /* Glass morphism on all panels */
    header {
      background: rgba(15,13,28,0.82) !important;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(139,92,246,0.3) !important;
      box-shadow: 0 2px 24px rgba(0,0,0,0.5);
    }

    .admin-section {
      background: rgba(28,24,52,0.75) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(139,92,246,0.25) !important;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    .message.assistant .message-content {
      background: rgba(28,24,52,0.82) !important;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-left: 3px solid var(--primary);
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .message.user .message-content {
      background: rgba(139,92,246,0.85) !important;
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 12px rgba(139,92,246,0.4);
    }

    .input-bar {
      background: rgba(15,13,28,0.88) !important;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(139,92,246,0.2) !important;
    }

    #chat-input {
      background: rgba(28,24,52,0.7) !important;
      backdrop-filter: blur(8px);
    }

    .tab-bar {
      background: rgba(15,13,28,0.88) !important;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(139,92,246,0.2) !important;
    }

    #messages {
      background: transparent !important;
    }

    .view-container {
      background: transparent !important;
    }

    #app {
      background: transparent !important;
    }

    /* Realistic bubble panel */
    #bubble-panel {
      background: rgba(15,10,5,0.92) !important;
      border: 1px solid rgba(246,216,96,0.4) !important;
      backdrop-filter: blur(20px) !important;
      -webkit-backdrop-filter: blur(20px) !important;
      box-shadow: 0 8px 40px rgba(198,150,12,0.25), inset 0 0 30px rgba(246,216,96,0.04) !important;
    }

    .bp-header {
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(246,216,96,0.2);
      margin-bottom: 4px;
    }

    /* Ancient gold glow on bubble idle */
    #gone-bubble {
      box-shadow: 0 0 20px 6px rgba(198,150,12,0.5), 0 0 60px 10px rgba(198,150,12,0.15) !important;
    }

    /* Toast realistic */
    #gone-toast {
      background: rgba(15,10,5,0.94) !important;
      border: 1px solid rgba(246,216,96,0.5) !important;
      backdrop-filter: blur(20px) !important;
      box-shadow: 0 4px 32px rgba(198,150,12,0.3) !important;
    }

    .toast-title {
      color: #f6d860 !important;
      letter-spacing: 0.12em;
    }

    /* Wallpaper overlay so text stays readable */
    #wallpaper-overlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: rgba(10,7,20,0.55);
      pointer-events: none;
    }

    /* Wallpaper section in settings */
    .wallpaper-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .wallpaper-preset {
      height: 56px;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .wallpaper-preset:hover, .wallpaper-preset.active {
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(52,231,196,0.4);
    }

    .wallpaper-upload-btn {
      width: 100%;
      padding: 10px;
      background: rgba(139,92,246,0.15);
      border: 2px dashed rgba(139,92,246,0.5);
      border-radius: 8px;
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      margin-top: 10px;
      transition: all 0.2s;
    }
    .wallpaper-upload-btn:hover {
      background: rgba(139,92,246,0.25);
      border-color: var(--primary);
      color: var(--text);
    }

    /* Ancient symbols decoration on chat header */
    .ancient-deco {
      font-size: 13px;
      color: rgba(246,216,96,0.4);
      letter-spacing: 0.3em;
      text-align: center;
      padding: 4px 0 2px;
      pointer-events: none;
    }

    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg);
    }

    /* ──── HEADER ──── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: var(--bg-elev);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .orb {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #5b3aa8);
      box-shadow: 0 0 16px rgba(139, 92, 246, 0.4);
      animation: breathe 3s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(0.95); opacity: 0.85; }
      50% { transform: scale(1.05); opacity: 1; }
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .brand .title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.05em;
    }

    .brand .status {
      font-size: 10px;
      color: var(--text-faint);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .header-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: none;
      background: var(--surface);
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .icon-btn:hover {
      background: var(--border);
      color: var(--accent);
    }

    /* ──── MAIN CONTENT ──── */
    main {
      flex: 1;
      overflow: hidden;
      display: flex;
      position: relative;
    }

    .view-container {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      opacity: 1;
      transition: opacity 0.3s, visibility 0.3s;
      visibility: visible;
    }

    .view-container.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* ──── CHAT VIEW ──── */
    #messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }

    .message {
      display: flex;
      gap: 10px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-content {
      max-width: 85%;
      padding: 12px 14px;
      border-radius: 12px;
      word-wrap: break-word;
      line-height: 1.4;
    }

    .message.assistant .message-content {
      background: var(--surface);
      border-left: 3px solid var(--primary);
    }

    .message.user .message-content {
      background: var(--primary);
      color: white;
    }

    .message-meta {
      font-size: 11px;
      color: var(--text-faint);
      margin-top: 4px;
    }

    .input-bar {
      padding: 12px 16px;
      background: var(--bg-elev);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #chat-input {
      flex: 1;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      resize: none;
      max-height: 100px;
    }

    #chat-input::placeholder {
      color: var(--text-faint);
    }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .send-btn:hover {
      background: var(--primary);
      opacity: 0.9;
      transform: scale(1.05);
    }

    /* ──── ADMIN PANEL ──── */
    .admin-panel {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .admin-section {
      margin-bottom: 20px;
      padding: 16px;
